
# ConfigMap for openclew
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclew-config
  namespace: openclew
  labels:
    app.kubernetes.io/name: openclew
    app.kubernetes.io/component: backend
data:
  # Application settings
  ENVIRONMENT: "production"
  DEBUG: "false"
  PROJECT_NAME: "openclew"
  API_V1_STR: "/api/v1"
  # PostgreSQL settings
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5433"
  POSTGRES_DB: "openclew"
  # Redis settings
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  # Celery settings
  CELERY_BROKER_URL: "redis://redis-service:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/0"
  # CORS settings (adjust for your domain)
  CORS_ORIGINS: '["https://openclew.example.com"]'
